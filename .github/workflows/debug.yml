name: デバッグ：エラー確認用

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pythonで直接APIテスト（結果をファイルに保存）
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 debug_api_test.py 2>&1 | tee debug_result.txt

      - name: 結果をコミット
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add debug_result.txt
          git commit -m "🐛 デバッグ結果"
          git push
