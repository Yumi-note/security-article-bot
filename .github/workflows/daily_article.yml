name: 毎朝セキュリティ記事生成

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      override_topic:
        description: 'テーマを手動指定（空欄で自動選択）'
        required: false
        default: ''

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 記事生成
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OVERRIDE_TOPIC: ${{ github.event.inputs.override_topic }}
        run: python generate_article.py

      - name: 記事ファイルをコミット
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          mkdir -p articles logs
          git add articles/ logs/
          git diff --staged --quiet || git commit -m "📝 $(date +'%Y-%m-%d') セキュリティ解説記事を自動生成"
          git push
